<body>



    <!-- ================= NAVBAR ================= -->


    <header class="header">

        <div class="logo">
            <a href="../../algoud/home.html">

            </a>
        </div>

        <nav class="navbar">
            <a href="../../algoud/home.html">الرئيسية</a>
            <a href="../../pages/navbar-pages/community.html">آخر الأخبار</a>

        <div class="header-icons">

            <i class="fa-solid fa-magnifying-glass"></i>

            <button class="supplier-btn">مورد؟</button>

            <button class="buyer-btn">مشتري؟</button>

    <!-- ================= FORM ================= -->

    <section class="request-box">

        <h2>طلب شراء</h2>

        <img class="megaphone" src="../../images/logo/megaphone.png" alt="">

        <textarea
            placeholder="اكتب هنا تفاصيل طلب الشراء من نوع وكمية المنتج المطلوب وبعد ذلك اختر القسم والمنتج الخاص بالطلب وسوف يتم ارسال طلبك الي كل الموردين المختصين بطلبك وسيتم التواصل معك من قبلهم في اقرب وقت"></textarea>

        <label>القسم</label>

        <select>

            <option>اختر القسم</option>

            <option>مواد غذائية</option>

            <option>معدات</option>

            <option>تعبئة وتغليف</option>

        </select>

        <label>المنتج</label>

        <select>

            <option>اختر المنتج</option>

            <option>سكر</option>

            <option>أرز</option>

            <option>زيت</option>

        </select>

        <button class="send-btn">
            ارسال
        </button>

    </section>
