<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlGoud</title>

    <link rel="stylesheet" href="log.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Navbar -->

    <nav>

        <div class="logo">
            <img src="../images/logo/algoudr.png" alt="">
        </div>

        <ul>

            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">آخر الأخبار</a></li>
            <li><a href="#">العروض</a></li>
            <li><a href="#">Exports</a></li>
            <li><a href="#">طلب شراء</a></li>

        </ul>

        <div class="nav-icons">

            <button class="supplier">مورد</button>
            <button class="buyer">مشتري</button>

            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-star"></i>
            <i class="fa-regular fa-comment"></i>
            <i class="fa-solid fa-cart-shopping"></i>

        </div>

    </nav>

    <!-- Main -->

    <section class="main">

        <div class="container">

            <!-- Existing User -->

            <div class="login">

                <i class="fa-solid fa-user-check user-icon"></i>

                <h2>مستخدم مسجل</h2>

                <input type="text" placeholder="* الموبايل">

                <button>تسجيل دخول</button>

            </div>

            <div class="divider"></div>

            <!-- New User -->

            <div class="register">

                <i class="fa-solid fa-user-plus user-icon"></i>

                <h2>مستخدم جديد</h2>

                <input type="text" placeholder="* الاسم">
                <input type="text" placeholder="* الموبايل">
                <input type="text" placeholder="* اسم الشركة">

                <select>

                    <option>نوع النشاط</option>
                    <option>مصنع</option>
                    <option>تاجر</option>

                </select>

                <button>مستخدم جديد</button>

            </div>

        </div>

        <!-- Statistics -->

        <div class="stats">

            <div>

                <h1>6,378</h1>

                <p>المنتجات</p>

            </div>

            <div>

                <h1>126,559</h1>

                <p>المستخدمون</p>

            </div>

            <div>

                <h1>266</h1>

                <p>الموردين</p>

            </div>

        </div>

    </section>

</body>

</html>
